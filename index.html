<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja Canada — Foguetes & Poções · Oberon MC</title>
<meta name="description" content="Loja Canada — a loja de jogador mais completa do Oberon MC: foguetes e poções com o melhor preço. Veja o catálogo, preços e novidades!">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='4' y='4' width='24' height='24' rx='5' fill='%23DC2626'/%3E%3Crect x='9' y='9' width='14' height='5' fill='%230A0A0A'/%3E%3Crect x='9' y='18' width='14' height='5' fill='%230A0A0A'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
/* ============================================================
   OBERON MC — LOJA CANADA · Design System (Red/Black Dashboard)
   ============================================================ */
:root{
  --red:#DC2626;
  --red-600:#B91C1C;
  --red-700:#991B1B;
  --red-glow:rgba(220,38,38,.35);
  --red-soft:rgba(220,38,38,.12);
  --bg0:#0A0A0A;
  --bg1:#171717;
  --bg2:#1F1F1F;
  --glass:rgba(23,23,23,.55);
  --glass-strong:rgba(20,20,20,.82);
  --stroke:rgba(255,255,255,.07);
  --stroke-red:rgba(220,38,38,.35);
  --text:#F5F5F5;
  --muted:#A3A3A3;
  --muted-2:#6B6B6B;
  --gold:#F59E0B;
  --green:#22C55E;
  --amber:#F59E0B;
  --blue:#3B82F6;
  --sidebar-w:272px;
  --radius:18px;
  --font:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  --font-pixel:'Press Start 2P',ui-monospace,'Courier New',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:var(--font);
  background:var(--bg0);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
::selection{background:var(--red);color:#fff}
/* Scrollbar vermelha */
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:var(--bg0)}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--red),var(--red-700));border-radius:8px;border:2px solid var(--bg0)}
::-webkit-scrollbar-thumb:hover{background:var(--red)}
nav::-webkit-scrollbar{width:6px}

/* ---------- Background FX ---------- */
#bg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(1000px 500px at 85% -10%,rgba(220,38,38,.16),transparent 60%),
    radial-gradient(800px 420px at -10% 40%,rgba(153,27,27,.12),transparent 60%),
    radial-gradient(700px 500px at 110% 100%,rgba(220,38,38,.09),transparent 60%),
    linear-gradient(180deg,#0A0A0A 0%,#0D0B0B 50%,#0A0A0A 100%);
}
#bg::before{content:"";position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.022) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.022) 1px,transparent 1px);
  background-size:44px 44px;
  mask-image:radial-gradient(ellipse 90% 70% at 50% 30%,#000 30%,transparent 75%);
}
#fx{position:fixed;inset:0;z-index:1;pointer-events:none}
#cursorGlow{position:fixed;width:260px;height:260px;border-radius:50%;pointer-events:none;z-index:2;
  background:radial-gradient(circle,rgba(220,38,38,.10),transparent 65%);
  transform:translate(-50%,-50%);left:-500px;transition:opacity .3s;mix-blend-mode:screen}

/* ---------- Intro ---------- */
#intro{position:fixed;inset:0;z-index:100;background:var(--bg0);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;transition:opacity .6s ease,visibility .6s}
#intro.hide{opacity:0;visibility:hidden}
#intro .i-logo{font-family:var(--font-pixel);font-size:clamp(20px,4.4vw,40px);letter-spacing:.04em;animation:introPop .9s cubic-bezier(.2,1.4,.4,1) both}
#intro .i-logo b{color:var(--red);text-shadow:0 0 24px var(--red-glow)}
#intro .i-sub{font-size:12px;letter-spacing:.5em;text-transform:uppercase;color:var(--muted);animation:introUp .8s .35s both}
#intro .i-bar{width:180px;height:3px;background:var(--bg2);border-radius:99px;overflow:hidden;animation:introUp .8s .5s both}
#intro .i-bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--red-700),var(--red));animation:introBar 1.1s .3s cubic-bezier(.6,0,.3,1) forwards;box-shadow:0 0 12px var(--red)}
@keyframes introPop{0%{opacity:0;transform:scale(.8)}100%{opacity:1;transform:scale(1)}}
@keyframes introUp{0%{opacity:0;transform:translateY(12px)}100%{opacity:1;transform:translateY(0)}}
@keyframes introBar{0%{width:0}100%{width:100%}}

/* ---------- Layout ---------- */
#app{position:relative;z-index:3;display:flex;min-height:100vh}
main#view{flex:1;margin-left:var(--sidebar-w);padding:34px 38px 90px;min-width:0}
.view-anim{animation:viewIn .45s cubic-bezier(.2,.9,.3,1) both}
@keyframes viewIn{0%{opacity:0;transform:translateY(16px)}100%{opacity:1;transform:translateY(0)}}
.wrap{max-width:1180px;margin:0 auto}

/* ---------- Sidebar ---------- */
#sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);z-index:40;
  display:flex;flex-direction:column;
  background:linear-gradient(180deg,rgba(18,18,18,.92),rgba(10,10,10,.94));
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-right:1px solid var(--stroke);
  transition:transform .35s cubic-bezier(.2,.9,.3,1);
}
.sb-logo{padding:26px 22px 20px;border-bottom:1px solid var(--stroke);cursor:pointer}
.sb-logo .l1{font-family:var(--font-pixel);font-size:15px;letter-spacing:.03em}
.sb-logo .l1 b{color:var(--red);text-shadow:0 0 18px var(--red-glow)}
.sb-logo .l2{margin-top:9px;font-size:10.5px;letter-spacing:.42em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:8px}
.sb-logo .l2::before{content:"";width:6px;height:6px;background:var(--red);border-radius:2px;box-shadow:0 0 10px var(--red)}
.sb-nav{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:5px}
.nav-item{display:flex;align-items:center;gap:12px;width:100%;padding:11px 13px;border:1px solid transparent;border-radius:12px;
  background:transparent;color:var(--muted);font:600 14px var(--font);cursor:pointer;text-align:left;
  transition:all .22s ease;position:relative}
.nav-item .ic{width:19px;height:19px;flex:none;transition:all .22s}
.nav-item .chev{margin-left:auto;width:15px;height:15px;transition:transform .25s}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,.04)}
.nav-item.active{color:#fff;background:linear-gradient(90deg,var(--red-soft),transparent);border-color:var(--stroke-red)}
.nav-item.active::before{content:"";position:absolute;left:-14px;top:20%;bottom:20%;width:3px;border-radius:3px;background:var(--red);box-shadow:0 0 12px var(--red)}
.nav-item.active .ic{color:var(--red);filter:drop-shadow(0 0 6px var(--red-glow))}
.nav-group.open>.nav-item .chev{transform:rotate(180deg)}
.nav-sub{max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.2,.9,.3,1);display:flex;flex-direction:column;gap:2px;margin-left:31px;padding-left:13px;border-left:1px solid var(--stroke)}
.nav-group.open .nav-sub{max-height:320px;padding-top:4px;padding-bottom:4px}
.sub-item{display:flex;align-items:center;gap:8px;padding:8px 11px;font:600 12.5px var(--font);color:var(--muted-2);background:none;border:none;border-radius:9px;cursor:pointer;text-align:left;transition:all .2s}
.sub-item:hover{color:var(--text);background:rgba(255,255,255,.04)}
.sub-item.active{color:var(--red);background:var(--red-soft)}
.sub-item .dot{width:5px;height:5px;border-radius:2px;background:currentColor;opacity:.6}
.sb-foot{padding:16px;border-top:1px solid var(--stroke);display:flex;flex-direction:column;gap:10px}
.sb-online{display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--muted);padding:10px 12px;border:1px solid var(--stroke);border-radius:12px;background:rgba(255,255,255,.02)}
.sb-online b{color:var(--text);font-size:14px}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);animation:livePulse 2s infinite;flex:none}
@keyframes livePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.admin-gear{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:11px;border-radius:12px;
  border:1px solid var(--stroke);background:rgba(255,255,255,.02);color:var(--muted);font:600 13px var(--font);cursor:pointer;transition:all .25s}
.admin-gear:hover{color:var(--red);border-color:var(--stroke-red);box-shadow:0 0 18px rgba(220,38,38,.15)}
.admin-gear .ic{width:17px;height:17px;transition:transform .5s}
.admin-gear:hover .ic{transform:rotate(120deg)}

/* ---------- Topbar (mobile) ---------- */
#topbar{display:none;position:sticky;top:0;z-index:30;align-items:center;gap:14px;padding:13px 16px;
  background:rgba(10,10,10,.85);backdrop-filter:blur(14px);border-bottom:1px solid var(--stroke)}
#topbar .t-logo{font-family:var(--font-pixel);font-size:11px}
#topbar .t-logo b{color:var(--red)}
.icon-btn{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:11px;border:1px solid var(--stroke);background:rgba(255,255,255,.03);color:var(--muted);cursor:pointer;transition:all .2s;flex:none}
.icon-btn:hover{color:var(--red);border-color:var(--stroke-red)}
.icon-btn .ic{width:19px;height:19px}
#scrim{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);z-index:35;opacity:0;visibility:hidden;transition:all .3s}
#scrim.show{opacity:1;visibility:visible}

/* ---------- Generic UI ---------- */
.ic{width:1.15em;height:1.15em;vertical-align:-0.2em}
.pill{display:inline-flex;align-items:center;gap:7px;padding:5px 12px;border-radius:99px;font-size:11.5px;font-weight:700;letter-spacing:.04em;border:1px solid var(--stroke);background:rgba(255,255,255,.03);color:var(--muted)}
.pill .ic{width:13px;height:13px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 20px;border-radius:13px;font:700 13.5px var(--font);letter-spacing:.02em;border:1px solid var(--stroke);background:rgba(255,255,255,.03);color:var(--text);cursor:pointer;transition:all .25s ease;text-decoration:none}
.btn:hover{transform:translateY(-1px);border-color:rgba(255,255,255,.18);background:rgba(255,255,255,.06)}
.btn:active{transform:translateY(0) scale(.98)}
.btn-red{background:linear-gradient(135deg,var(--red),var(--red-700));border-color:rgba(255,120,120,.25);box-shadow:0 4px 22px rgba(220,38,38,.28)}
.btn-red:hover{box-shadow:0 6px 32px rgba(220,38,38,.5);border-color:rgba(255,120,120,.45);background:linear-gradient(135deg,#EF4444,var(--red-600))}
.btn-danger{color:#FCA5A5;border-color:rgba(220,38,38,.35);background:rgba(220,38,38,.08)}
.btn-danger:hover{background:rgba(220,38,38,.18);border-color:var(--red)}
.btn-gold{background:linear-gradient(135deg,#B45309,#92400E);border-color:rgba(245,158,11,.35);box-shadow:0 4px 20px rgba(245,158,11,.2)}
.btn-gold:hover{box-shadow:0 6px 28px rgba(245,158,11,.4)}
.btn-sm{padding:7px 13px;font-size:12px;border-radius:10px}
.btn .ic{width:16px;height:16px}
input,select,textarea{width:100%;padding:11px 14px;border-radius:12px;border:1px solid var(--stroke);background:rgba(0,0,0,.35);color:var(--text);font:500 14px var(--font);outline:none;transition:all .2s}
input:focus,select:focus,textarea:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(220,38,38,.15)}
input::placeholder,textarea::placeholder{color:var(--muted-2)}
select option{background:var(--bg1)}
textarea{resize:vertical;min-height:90px}
.field{display:flex;flex-direction:column;gap:7px;margin-bottom:15px}
.field label{font:700 11.5px var(--font);letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.field small{color:var(--muted-2);font-size:11.5px}
.glass{background:var(--glass);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid var(--stroke);border-radius:var(--radius)}
.card{background:var(--glass);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid var(--stroke);border-radius:var(--radius);padding:22px;transition:all .3s cubic-bezier(.2,.9,.3,1)}
.card:hover{border-color:rgba(255,255,255,.14);transform:translateY(-3px)}
.sec-head{display:flex;align-items:center;gap:12px;margin:38px 0 18px}
.sec-head .s-ic{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:11px;background:var(--red-soft);border:1px solid var(--stroke-red);color:var(--red)}
.sec-head .s-ic .ic{width:18px;height:18px}
.sec-head h2{font:800 21px var(--font);letter-spacing:-.02em}
.sec-head .line{flex:1;height:1px;background:linear-gradient(90deg,var(--stroke-red),transparent)}
.empty{padding:52px 20px;text-align:center;color:var(--muted-2)}
.empty .ic{width:38px;height:38px;margin-bottom:12px;color:var(--muted-2);opacity:.6}
.empty p{font-weight:600}

/* Reveal on scroll */
.reveal{opacity:0;transform:translateY(22px);transition:opacity .6s cubic-bezier(.2,.9,.3,1),transform .6s cubic-bezier(.2,.9,.3,1)}
.reveal.in{opacity:1;transform:translateY(0)}

/* ---------- HOME ---------- */
.hero{position:relative;overflow:hidden;border-radius:26px;padding:56px 42px 50px;
  background:linear-gradient(135deg,rgba(31,31,31,.75),rgba(12,12,12,.8)),radial-gradient(600px 300px at 80% 0%,rgba(220,38,38,.22),transparent 60%);
  backdrop-filter:blur(20px);border:1px solid var(--stroke);text-align:center}
.hero::before{content:"";position:absolute;inset:-2px;border-radius:28px;padding:1px;background:linear-gradient(120deg,transparent 30%,rgba(220,38,38,.5),transparent 70%);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;opacity:.7}
.hero-badge{display:inline-flex;align-items:center;gap:8px;padding:7px 15px;border-radius:99px;background:rgba(220,38,38,.1);border:1px solid var(--stroke-red);color:#FCA5A5;font:700 11.5px var(--font);letter-spacing:.14em;text-transform:uppercase;margin-bottom:22px}
.hero-logo{font-family:var(--font-pixel);font-size:clamp(24px,5.4vw,52px);letter-spacing:.02em;line-height:1.15;text-shadow:0 4px 30px rgba(0,0,0,.6)}
.hero-logo b{color:var(--red);text-shadow:0 0 34px rgba(220,38,38,.55)}
.hero-sub{margin-top:16px;color:var(--muted);font-size:15px;max-width:540px;margin-inline:auto;line-height:1.65}
.hero-tag{margin-top:10px;font-size:11px;letter-spacing:.5em;text-transform:uppercase;color:var(--red);font-weight:800}
.ip-box{display:inline-flex;align-items:center;gap:13px;margin-top:30px;padding:13px 13px 13px 20px;border-radius:15px;
  background:rgba(0,0,0,.45);border:1px solid var(--stroke-red);box-shadow:0 0 30px rgba(220,38,38,.12),inset 0 0 20px rgba(220,38,38,.05)}
.ip-box .ip-ic{color:var(--red)}
.ip-box .ip-ic .ic{width:19px;height:19px}
.ip-text{font:700 16px ui-monospace,'Courier New',monospace;letter-spacing:.06em;color:#fff}
.ip-ver{font-size:10.5px;color:var(--muted-2);letter-spacing:.08em;text-transform:uppercase;font-weight:700}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-top:22px}
.stat{position:relative;overflow:hidden;text-align:left;padding:24px 22px}
.stat .s-top{display:flex;align-items:center;justify-content:space-between}
.stat .s-label{font:700 11px var(--font);letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.stat .s-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:var(--red-soft);border:1px solid var(--stroke-red);color:var(--red)}
.stat .s-icon .ic{width:19px;height:19px}
.stat .s-value{margin-top:15px;font:900 38px var(--font);letter-spacing:-.03em;line-height:1}
.stat .s-value small{font-size:16px;color:var(--muted-2);font-weight:700}
.stat .s-note{margin-top:7px;font-size:12px;color:var(--muted-2)}
.stat::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;background:linear-gradient(90deg,var(--red),transparent);opacity:0;transition:opacity .3s}
.stat:hover::after{opacity:1}
.home-grid{display:grid;grid-template-columns:1.5fr 1fr;gap:18px;margin-top:6px}
.feat-card{display:flex;gap:16px;align-items:center;padding:18px 20px;margin-bottom:13px}
.feat-card:last-child{margin-bottom:0}
.feat-icon{width:52px;height:52px;flex:none;border-radius:14px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(220,38,38,.2),rgba(220,38,38,.05));border:1px solid var(--stroke-red);color:var(--red);transition:all .3s}
.feat-card:hover .feat-icon{box-shadow:0 0 22px var(--red-glow);transform:scale(1.06)}
.feat-icon .ic{width:23px;height:23px}
.feat-info{flex:1;min-width:0}
.feat-info h4{font-size:15px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.feat-info p{font-size:12.5px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.feat-price{font:800 16px var(--font);color:var(--red);white-space:nowrap}
.about-card{padding:26px}
.about-card p{color:var(--muted);line-height:1.75;font-size:14.5px;margin-top:10px}
.about-card .hl{color:var(--red);font-weight:700}
.mini-upd{padding:16px 18px;margin-bottom:12px;cursor:pointer}
.mini-upd .m-tag{display:inline-block;font:800 10.5px ui-monospace,monospace;padding:3px 9px;border-radius:7px;background:var(--red-soft);border:1px solid var(--stroke-red);color:var(--red);margin-bottom:8px}
.mini-upd h4{font-size:14px}
.mini-upd p{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.55}
.mini-upd time{font-size:11px;color:var(--muted-2);margin-top:7px;display:block}

/* ---------- LOJA ---------- */
.shop-toolbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin:24px 0 8px}
.cat-pills{display:flex;gap:8px;flex-wrap:wrap;flex:1}
.cat-pill{padding:9px 17px;border-radius:12px;border:1px solid var(--stroke);background:rgba(255,255,255,.02);color:var(--muted);font:700 12.5px var(--font);cursor:pointer;transition:all .22s}
.cat-pill:hover{color:var(--text);border-color:rgba(255,255,255,.15)}
.cat-pill.active{background:linear-gradient(135deg,var(--red),var(--red-700));color:#fff;border-color:rgba(255,120,120,.3);box-shadow:0 4px 18px rgba(220,38,38,.3)}
.cat-pill .cnt{opacity:.65;font-size:11px;margin-left:5px}
.search-box{position:relative;width:240px}
.search-box .ic{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--muted-2)}
.search-box input{padding-left:38px}
.shop-note{display:flex;align-items:center;gap:10px;padding:13px 17px;border-radius:13px;background:rgba(220,38,38,.06);border:1px dashed var(--stroke-red);color:var(--muted);font-size:12.5px;margin:14px 0 22px}
.shop-note .ic{color:var(--red);width:16px;height:16px;flex:none}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:17px}
.item-card{position:relative;display:flex;flex-direction:column;overflow:hidden;padding:0}
.item-card:hover{border-color:var(--stroke-red);box-shadow:0 14px 40px rgba(220,38,38,.16),0 0 0 1px var(--stroke-red)}
.item-visual{position:relative;height:132px;display:flex;align-items:center;justify-content:center;background:
  radial-gradient(220px 110px at 50% 120%,rgba(220,38,38,.28),transparent 70%),
  linear-gradient(180deg,rgba(255,255,255,.025),transparent);border-bottom:1px solid var(--stroke)}
.item-visual::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.028) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.028) 1px,transparent 1px);background-size:22px 22px;mask-image:radial-gradient(140px 90px at 50% 60%,#000,transparent)}
.item-visual .ic{width:52px;height:52px;color:var(--red);position:relative;filter:drop-shadow(0 6px 18px rgba(220,38,38,.5));transition:transform .35s cubic-bezier(.2,1.4,.4,1)}
.item-card:hover .item-visual .ic{transform:scale(1.15) rotate(-4deg)}
.badge{position:absolute;top:12px;right:12px;padding:5px 11px;border-radius:9px;font:800 10px var(--font);letter-spacing:.12em;z-index:2;display:inline-flex;align-items:center;gap:5px}
.badge .ic{width:11px;height:11px}
.badge-novo{background:linear-gradient(135deg,var(--red),var(--red-700));color:#fff;box-shadow:0 3px 14px rgba(220,38,38,.5);animation:badgePulse 2.2s infinite}
.badge-destaque{background:linear-gradient(135deg,#B45309,#78350F);color:#FDE68A;border:1px solid rgba(245,158,11,.4);box-shadow:0 3px 14px rgba(245,158,11,.3)}
@keyframes badgePulse{0%,100%{box-shadow:0 3px 14px rgba(220,38,38,.5)}50%{box-shadow:0 3px 24px rgba(220,38,38,.9)}}
.item-body{padding:18px 18px 19px;display:flex;flex-direction:column;flex:1}
.item-cat{font:800 10px var(--font);letter-spacing:.16em;text-transform:uppercase;color:var(--muted-2);margin-bottom:7px}
.item-name{font:800 16.5px var(--font);letter-spacing:-.01em}
.item-desc{margin-top:7px;font-size:13px;color:var(--muted);line-height:1.6;flex:1}
.item-foot{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding-top:15px;border-top:1px solid var(--stroke)}
.item-price{font:900 20px var(--font);letter-spacing:-.02em;color:#fff}
.item-price small{font-size:12px;color:var(--red);font-weight:800;margin-right:2px}
.item-id{font-size:10.5px;color:var(--muted-2);font-weight:600}

/* ---------- EQUIPE ---------- */
.staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:18px}
.staff-card{text-align:center;padding:30px 20px 26px;position:relative;overflow:hidden;transition:all .35s cubic-bezier(.2,.9,.3,1)}
.staff-card::before{content:"";position:absolute;inset:0;border-radius:inherit;padding:1.5px;background:linear-gradient(160deg,transparent 40%,var(--red),transparent 80%);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:0;transition:opacity .35s;pointer-events:none}
.staff-card:hover{transform:translateY(-6px);box-shadow:0 20px 50px rgba(220,38,38,.22)}
.staff-card:hover::before{opacity:1}
.staff-avatar{width:92px;height:92px;margin:0 auto;position:relative;border-radius:20px;padding:10px;background:linear-gradient(160deg,rgba(220,38,38,.14),rgba(0,0,0,.3));border:1px solid var(--stroke-red)}
.staff-avatar svg,.staff-avatar img{width:100%;height:100%;image-rendering:pixelated;border-radius:8px}
.staff-card:hover .staff-avatar{animation:avatarBob 1.4s ease infinite}
@keyframes avatarBob{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
.staff-name{margin-top:16px;font:800 17px var(--font)}
.role-chip{display:inline-flex;align-items:center;gap:6px;margin-top:9px;padding:5px 13px;border-radius:99px;font:800 10.5px var(--font);letter-spacing:.12em;text-transform:uppercase;border:1px solid}
.role-dono{color:#FCA5A5;background:rgba(220,38,38,.13);border-color:rgba(220,38,38,.45);box-shadow:0 0 16px rgba(220,38,38,.2)}
.role-admin{color:#FCD34D;background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.4)}
.role-moderador{color:#6EE7B7;background:rgba(52,211,153,.09);border-color:rgba(52,211,153,.35)}
.role-ajudante{color:#93C5FD;background:rgba(59,130,246,.09);border-color:rgba(59,130,246,.35)}
.role-socio{color:#FCD34D;background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.4)}
.role-estoquista{color:#6EE7B7;background:rgba(52,211,153,.09);border-color:rgba(52,211,153,.35)}
.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.step{padding:22px}
.step .n{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--red),var(--red-700));display:flex;align-items:center;justify-content:center;font:800 14px var(--font);margin-bottom:13px;box-shadow:0 0 18px rgba(220,38,38,.35)}
.step h4{font-size:14.5px;margin-bottom:7px}
.step p{font-size:12.5px;color:var(--muted);line-height:1.65}
.step p b{color:var(--red)}
.staff-desc{margin-top:12px;font-size:12.5px;color:var(--muted);line-height:1.6}

/* ---------- SUGESTÕES ---------- */
.sugg-layout{display:grid;grid-template-columns:400px 1fr;gap:20px;align-items:start}
.sugg-form-card{padding:26px;position:sticky;top:24px}
.sugg-form-card h3{display:flex;align-items:center;gap:10px;font-size:16.5px;margin-bottom:20px}
.sugg-form-card h3 .ic{color:var(--red)}
.sugg-item{padding:17px 19px;margin-bottom:13px}
.sugg-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sugg-ava{width:34px;height:34px;border-radius:10px;overflow:hidden;flex:none;border:1px solid var(--stroke)}
.sugg-ava svg{width:100%;height:100%;image-rendering:pixelated}
.sugg-name{font-weight:800;font-size:13.5px}
.sugg-cat{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2)}
.sugg-text{margin-top:10px;font-size:13.5px;color:#D4D4D4;line-height:1.65}
.sugg-foot{margin-top:11px;display:flex;align-items:center;gap:10px;font-size:11px;color:var(--muted-2)}
.status-chip{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:99px;font:800 10px var(--font);letter-spacing:.1em;text-transform:uppercase;border:1px solid;margin-left:auto}
.status-chip::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
.st-pendente{color:#FBBF24;background:rgba(245,158,11,.09);border-color:rgba(245,158,11,.35)}
.st-aprovada{color:#4ADE80;background:rgba(34,197,94,.09);border-color:rgba(34,197,94,.35)}
.st-rejeitada{color:#F87171;background:rgba(239,68,68,.09);border-color:rgba(239,68,68,.35)}
.st-implementada{color:#60A5FA;background:rgba(59,130,246,.09);border-color:rgba(59,130,246,.4);box-shadow:0 0 14px rgba(59,130,246,.15)}

/* ---------- ATUALIZAÇÕES ---------- */
.timeline{position:relative;padding-left:34px;max-width:760px}
.timeline::before{content:"";position:absolute;left:9px;top:8px;bottom:8px;width:2px;background:linear-gradient(180deg,var(--red),rgba(220,38,38,.15),transparent)}
.upd-item{position:relative;margin-bottom:20px}
.upd-item::before{content:"";position:absolute;left:-31px;top:24px;width:12px;height:12px;border-radius:50%;background:var(--bg0);border:2.5px solid var(--red);box-shadow:0 0 14px var(--red-glow);z-index:1}
.upd-card{padding:22px 24px;transition:all .3s}
.upd-card:hover{border-color:var(--stroke-red);transform:translateX(4px)}
.upd-head{display:flex;align-items:center;gap:11px;flex-wrap:wrap}
.ver-tag{font:800 12px ui-monospace,monospace;padding:5px 12px;border-radius:9px;background:linear-gradient(135deg,var(--red-soft),transparent);border:1px solid var(--stroke-red);color:var(--red)}
.upd-date{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted-2);font-weight:600}
.upd-date .ic{width:13px;height:13px}
.upd-title{font:800 17.5px var(--font);margin-top:11px;letter-spacing:-.01em}
.upd-desc{margin-top:8px;font-size:13.5px;color:var(--muted);line-height:1.7}

/* ---------- Page head ---------- */
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap}
.page-head h1{font:900 clamp(26px,3.4vw,36px) var(--font);letter-spacing:-.03em}
.page-head h1 b{color:var(--red)}
.page-head .ph-sub{margin-top:7px;color:var(--muted);font-size:14px;max-width:560px;line-height:1.6}

/* ---------- MODAL ---------- */
#modalRoot{position:fixed;inset:0;z-index:80;display:none;align-items:center;justify-content:center;padding:20px}
#modalRoot.show{display:flex}
.modal-ov{position:absolute;inset:0;background:rgba(5,5,5,.75);backdrop-filter:blur(8px);animation:fadeIn .25s}
.modal{position:relative;width:min(560px,100%);max-height:88vh;overflow-y:auto;border-radius:22px;
  background:var(--glass-strong);backdrop-filter:blur(24px);border:1px solid var(--stroke);
  padding:28px;animation:modalIn .35s cubic-bezier(.2,1.3,.4,1)}
@keyframes fadeIn{from{opacity:0}}
@keyframes modalIn{0%{opacity:0;transform:scale(.92) translateY(14px)}100%{opacity:1;transform:scale(1) translateY(0)}}
.modal h3{font-size:18px;font-weight:800;display:flex;align-items:center;gap:11px;margin-bottom:22px;letter-spacing:-.01em}
.modal h3 .h-ic{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;background:var(--red-soft);border:1px solid var(--stroke-red);color:var(--red)}
.modal h3 .h-ic .ic{width:17px;height:17px}
.modal-x{position:absolute;top:18px;right:18px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.icon-pick{display:flex;gap:7px;flex-wrap:wrap}
.icon-opt{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;border:1px solid var(--stroke);background:rgba(255,255,255,.03);color:var(--muted);cursor:pointer;transition:all .2s}
.icon-opt .ic{width:19px;height:19px}
.icon-opt:hover{color:var(--text);border-color:rgba(255,255,255,.2)}
.icon-opt.sel{color:var(--red);border-color:var(--red);background:var(--red-soft);box-shadow:0 0 14px rgba(220,38,38,.2)}

/* ---------- TOAST ---------- */
#toasts{position:fixed;bottom:22px;right:22px;z-index:90;display:flex;flex-direction:column;gap:10px;max-width:min(360px,calc(100vw - 40px))}
.toast{display:flex;align-items:center;gap:12px;padding:14px 17px;border-radius:15px;
  background:var(--glass-strong);backdrop-filter:blur(20px);border:1px solid var(--stroke);
  box-shadow:0 14px 40px rgba(0,0,0,.5);animation:toastIn .4s cubic-bezier(.2,1.3,.4,1);
  font:600 13.5px var(--font);position:relative;overflow:hidden}
.toast::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--red)}
.toast.out{animation:toastOut .3s forwards}
.toast .ic{width:18px;height:18px;flex:none;color:var(--red)}
.toast.t-success::before{background:var(--green)}.toast.t-success .ic{color:var(--green)}
.toast.t-sync::before{background:var(--blue)}.toast.t-sync .ic{color:var(--blue)}
.toast.t-warn::before{background:var(--amber)}.toast.t-warn .ic{color:var(--amber)}
@keyframes toastIn{0%{opacity:0;transform:translateX(60px) scale(.95)}100%{opacity:1;transform:translateX(0) scale(1)}}
@keyframes toastOut{to{opacity:0;transform:translateX(60px) scale(.95)}}

/* ---------- ADMIN ---------- */
.admin-banner{display:flex;align-items:center;gap:14px;padding:16px 22px;border-radius:17px;margin-bottom:24px;
  background:linear-gradient(90deg,rgba(245,158,11,.12),rgba(220,38,38,.07));border:1px solid rgba(245,158,11,.3);
  flex-wrap:wrap}
.admin-banner .a-ic{width:42px;height:42px;border-radius:13px;background:linear-gradient(135deg,#B45309,#92400E);display:flex;align-items:center;justify-content:center;color:#FDE68A;flex:none}
.admin-banner .a-ic .ic{width:20px;height:20px}
.admin-banner h3{font-size:15.5px}
.admin-banner p{font-size:12px;color:var(--muted);margin-top:2px}
.admin-banner .a-right{margin-left:auto;display:flex;gap:9px;flex-wrap:wrap}
.adm-tabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:24px;padding:7px;border-radius:15px;background:rgba(255,255,255,.02);border:1px solid var(--stroke)}
.adm-tab{display:inline-flex;align-items:center;gap:8px;padding:10px 17px;border-radius:11px;border:1px solid transparent;background:transparent;color:var(--muted);font:700 12.5px var(--font);cursor:pointer;transition:all .2s}
.adm-tab .ic{width:15px;height:15px}
.adm-tab:hover{color:var(--text);background:rgba(255,255,255,.04)}
.adm-tab.active{background:linear-gradient(135deg,#B45309,#78350F);color:#FDE68A;border-color:rgba(245,158,11,.35);box-shadow:0 4px 18px rgba(245,158,11,.22)}
.adm-head{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.adm-head h2{font-size:20px;font-weight:800;letter-spacing:-.02em}
.adm-list{display:flex;flex-direction:column;gap:10px}
.adm-row{display:flex;align-items:center;gap:15px;padding:15px 18px;border-radius:15px;background:var(--glass);backdrop-filter:blur(14px);border:1px solid var(--stroke);transition:all .2s}
.adm-row:hover{border-color:rgba(255,255,255,.14)}
.adm-row .r-ic{width:44px;height:44px;flex:none;border-radius:12px;display:flex;align-items:center;justify-content:center;background:var(--red-soft);border:1px solid var(--stroke-red);color:var(--red)}
.adm-row .r-ic .ic{width:20px;height:20px}
.adm-row .r-ava{width:44px;height:44px;flex:none;border-radius:12px;overflow:hidden;border:1px solid var(--stroke);background:#000}
.adm-row .r-ava svg{width:100%;height:100%;image-rendering:pixelated}
.adm-row .r-info{flex:1;min-width:0}
.adm-row .r-info h4{font-size:14.5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.adm-row .r-info p{font-size:12px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.adm-row .r-side{text-align:right;margin-right:6px;flex:none}
.adm-row .r-side b{font-size:15px;color:var(--red)}
.adm-row .r-side small{display:block;color:var(--muted-2);font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.row-actions{display:flex;gap:7px;flex:none}
.login-wrap{min-height:calc(100vh - 160px);display:flex;align-items:center;justify-content:center}
.login-card{width:min(400px,100%);padding:36px 32px;text-align:center;position:relative;overflow:hidden}
.login-card::before{content:"";position:absolute;inset:0;border-radius:inherit;padding:1.5px;background:linear-gradient(160deg,rgba(245,158,11,.6),transparent 40%,rgba(220,38,38,.5));-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
.login-ic{width:66px;height:66px;margin:0 auto 20px;border-radius:20px;background:linear-gradient(135deg,#B45309,#78350F);display:flex;align-items:center;justify-content:center;color:#FDE68A;box-shadow:0 8px 30px rgba(245,158,11,.25)}
.login-ic .ic{width:28px;height:28px}
.login-card h2{font-size:21px;font-weight:900;letter-spacing:-.02em}
.login-card .hint{margin-top:8px;font-size:12px;color:var(--muted);line-height:1.6}
.login-card .hint code{color:var(--gold);background:rgba(245,158,11,.1);padding:2px 8px;border-radius:6px;font-size:11.5px}
.login-card form{margin-top:24px;text-align:left}
.shake{animation:shake .45s}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.stat-mini{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:22px}
.stat-mini .sm{flex:1;min-width:130px;padding:15px 17px;border-radius:14px;background:var(--glass);border:1px solid var(--stroke)}
.stat-mini .sm b{font-size:23px;font-weight:900;display:block}
.stat-mini .sm span{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2)}
.danger-zone{margin-top:26px;padding:20px;border-radius:16px;border:1px dashed rgba(239,68,68,.4);background:rgba(239,68,68,.04)}
.danger-zone h4{color:#FCA5A5;font-size:14px;margin-bottom:6px}
.danger-zone p{font-size:12px;color:var(--muted);margin-bottom:14px}

footer.site-foot{margin-top:56px;padding-top:24px;border-top:1px solid var(--stroke);display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;color:var(--muted-2);font-size:12px}
footer.site-foot b{color:var(--muted)}

/* ---------- Responsive ---------- */
@media (max-width:900px){.steps{grid-template-columns:1fr}}
@media (max-width:1100px){
  .home-grid{grid-template-columns:1fr}
  .sugg-layout{grid-template-columns:1fr}
  .sugg-form-card{position:static}
}
@media (max-width:1024px){
  main#view{margin-left:0;padding:22px 18px 80px}
  #sidebar{transform:translateX(-105%)}
  #sidebar.open{transform:translateX(0);box-shadow:30px 0 80px rgba(0,0,0,.6)}
  #topbar{display:flex}
  #app{flex-direction:column}
}
@media (max-width:640px){
  .hero{padding:40px 22px 36px}
  .ip-text{font-size:13.5px}
  .form-row{grid-template-columns:1fr}
  .search-box{width:100%}
  .stat .s-value{font-size:31px}
  .upd-item::before{top:20px}
}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
}
</style>

function pixelFace(name){
  const h = hash(name||'steve');
  const skins=['#D9A066','#C68642','#8D5524','#F1C27D','#E0AC69','#FFDBAC'];
  const hairs=['#2A1A0E','#0F0F0F','#6B4423','#7F1D1D','#B91C1C','#3F3F46','#164E63','#365314'];
  const eyes =['#3B82F6','#22C55E','#8B5CF6','#92400E','#06B6D4','#DC2626'];
  const skin = skins[h%skins.length], hair = hairs[(h>>3)%hairs.length], eye = eyes[(h>>6)%eyes.length];
  const style = (h>>9)%3, shade = 'rgba(0,0,0,.22)';
  // grade 8x8
  const g = Array.from({length:8},()=>Array(8).fill(skin));
  for(let x=0;x<8;x++) g[0][x]=hair; // topo do cabelo
  const r1 = style===0 ? [0,7] : style===1 ? [0,1,6,7] : [0,2,5,7];
  r1.forEach(x=>g[1][x]=hair);
  if(style===2) g[2][0]=g[2][7]=hair;
  g[6][3]=shade; g[6][4]=shade; // boca
  // olhos 2px: branco + íris
  const px=[]; const S=8;
  for(let y=0;y<8;y++)for(let x=0;x<8;x++) px.push(`<rect x="${x}" y="${y}" width="1.02" height="1.02" fill="${g[y][x]}"/>`);
  px.push(`<rect x="1" y="3" width="1.02" height="1.02" fill="#fff"/><rect x="2" y="3" width="1.02" height="1.02" fill="${eye}"/>`);
  px.push(`<rect x="5" y="3" width="1.02" height="1.02" fill="${eye}"/><rect x="6" y="3" width="1.02" height="1.02" fill="#fff"/>`);
  return `<svg viewBox="0 0 ${S} ${S}" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">${px.join('')}</svg>`;
}

/* ---------- Store: estado + persistência + TEMPO REAL ---------- */
const DB_KEY = 'oberonmc_store_v2';
let state = loadState();
function loadState(){
  try{
    const raw = localStorage.getItem(DB_KEY);
    if(raw){ const s = JSON.parse(raw); if(s && s.v===1) return s; }
  }catch(e){}
  return JSON.parse(JSON.stringify(SEED));
}
/* BroadcastChannel: sincroniza TODAS as abas abertas instantaneamente */
const hasBC = 'BroadcastChannel' in window;
const bc = hasBC ? new BroadcastChannel('oberonmc_realtime') : null;
function persist(broadcast = true){
  localStorage.setItem(DB_KEY, JSON.stringify(state));
  if(broadcast && bc) bc.postMessage({ t:'sync', s: state });
}
function applyRemote(newState){
  state = newState;
  render();
  toast('Dados atualizados em tempo real', 'sync', 'refresh');
}
if(bc) bc.onmessage = e => { if(e.data && e.data.t==='sync') applyRemote(e.data.s); };
/* Fallback via evento 'storage' (caso BroadcastChannel não exista) */
window.addEventListener('storage', e => {
  if(hasBC) return; // evita notificação duplicada
  if(e.key === DB_KEY && e.newValue){ try{ applyRemote(JSON.parse(e.newValue)); }catch(err){} }
});
/* Mutação central: qualquer alteração salva + transmite + re-renderiza */
function mutate(fn, toastMsg){
  fn(state);
  persist(true);
  render();
  if(toastMsg) toast(toastMsg, 'success', 'check');
}

/* ---------- LOJA ---------- */
function vLoja(){
  const cat = current.param || ui.lojaCat || 'Todos';
  const cats = categories();
  const q = ui.search.trim().toLowerCase();
  let list = state.items.filter(i => (cat==='Todos' || i.category===cat));
  if(q) list = list.filter(i => (i.name+' '+i.desc+' '+i.category).toLowerCase().includes(q));
  const cnt = c => c==='Todos' ? state.items.length : state.items.filter(i=>i.category===c).length;
  return `
  <div class="wrap view-anim">
    <div class="page-head">
      <div><h1>Lojas<b>.</b></h1><p class="ph-sub">Foguetes e poções com o melhor preço do Oberon MC. Escolha o produto e retire na loja física!</p></div>

    </div>
    <div class="shop-toolbar">
      <div class="cat-pills">
        <button class="cat-pill ${cat==='Todos'?'active':''}" data-action="filter-cat" data-cat="Todos">Todos<span class="cnt">${cnt('Todos')}</span></button>
        ${cats.map(c=>`<button class="cat-pill ${cat===c?'active':''}" data-action="filter-cat" data-cat="${esc(c)}">${esc(c)}<span class="cnt">${cnt(c)}</span></button>`).join('')}
      </div>
      <div class="search-box">${I('search')}<input id="shopSearch" placeholder="Buscar produto..." value="${esc(ui.search)}"></div>
    </div>
    <div class="shop-note">${I('pin')} <span><b style="color:var(--text)">Como comprar:</b> entre no <b style="color:var(--red)">${esc(state.config.ip)}</b> e vá até <b style="color:var(--red)">${esc(state.config.coords)}</b> — é só clicar na placa de shop. Pagamento com o $ do servidor!</span></div>
    ${list.length ? `<div class="grid">${list.map(i=>itemCard(i)).join('')}</div>`

}
function itemCard(i){
  const badge = i.badge==='novo' ? `<span class="badge badge-novo">NOVO</span>`

    <div class="item-body">
      <div class="item-cat">${esc(i.category)}</div>

}

let revealObs = null;
function render(){
  renderNav();
  const v = current.view;
  let html = '';
  if(v==='home') html = vHome();
  else if(v==='loja') html = vLoja();
  else if(v==='equipe') html = vEquipe();
  else if(v==='sugestoes') html = vSugestoes();
  else if(v==='atualizacoes') html = vAtualizacoes();
  else if(v==='admin'){
    if(current.param && ADM_TABS.some(t=>t[0]===current.param)) admTab = current.param;
    html = vAdmin();
  }
  else html = vHome();
  $('#view').innerHTML = html;
  afterRender();
}
function afterRender(){
  // contadores animados
  $$('[data-count]').forEach(el => animatedCount(el, Number(el.dataset.count||0)));
  // reveal on scroll
  if(revealObs) revealObs.disconnect();
  revealObs = new IntersectionObserver(entries=>{
    entries.forEach(en=>{ if(en.isIntersecting){ en.target.classList.add('in'); revealObs.unobserve(en.target); } });
  }, {threshold:.08});
  $$('.reveal:not(.in)').forEach(el=>revealObs.observe(el));
}

/* ---------- Delegação global de cliques ---------- */
document.addEventListener('click', e=>{
  const t = e.target.closest('[data-action]');
  if(!t) return;
  const a = t.dataset.action, id = t.dataset.id;

  if(a==='nav'){ navigate(t.dataset.view, t.dataset.param||null); }
  else if(a==='close-menu'){ closeSidebarMobile(); }
  else if(a==='copy-ip'){
    const ip = state.config.ip;
    const done = ()=>toast('IP copiado: '+ip, 'success', 'copy');
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(ip).then(done).catch(()=>{fallbackCopy(ip);done();});
    } else { fallbackCopy(ip); done(); }
  }
  else if(a==='filter-cat'){ ui.lojaCat = t.dataset.cat; navigate('loja', t.dataset.cat==='Todos'?null:t.dataset.cat); }
  else if(a==='modal-close'){ closeModal(); }
  else if(a==='modal-confirm'){ const cb=modalCb; closeModal(); if(cb) cb(); }
  else if(a==='pick-icon'){
    const form = t.closest('form');
    form.querySelector('input[name=icon]').value = t.dataset.icon;
    form.querySelectorAll('.icon-opt').forEach(b=>b.classList.toggle('sel', b===t));
  }
  else if(a==='adm-tab'){ admTab = t.dataset.tab; $('#admContent').innerHTML = admContent(); $$('.adm-tab').forEach(b=>b.classList.toggle('active', b.dataset.tab===admTab)); }
  else if(a==='admin-logout'){ sessionStorage.removeItem('oberon_admin_auth'); toast('Sessão de admin encerrada', 'warn', 'logout'); navigate('home'); }
  /* Itens */
  else if(a==='item-new'){ openModal(itemForm()); }
  else if(a==='item-edit'){ const it=state.items.find(x=>x.id===id); if(it) openModal(itemForm(it)); }
  else if(a==='item-del'){ const it=state.items.find(x=>x.id===id); if(it) confirmBox('Excluir item', `Remover <b style="color:#fff">${esc(it.name)}</b> da loja permanentemente?`, 'Excluir item', ()=> mutate(s=>{ s.items = s.items.filter(x=>x.id!==id); }, 'Item excluído da loja')); }
  /* Equipe */
  else if(a==='staff-new'){ openModal(staffForm()); }
  else if(a==='staff-edit'){ const m=state.staff.find(x=>x.id===id); if(m) openModal(staffForm(m)); }
  else if(a==='staff-del'){ const m=state.staff.find(x=>x.id===id); if(m) confirmBox('Excluir membro', `Remover <b style="color:#fff">${esc(m.name)}</b> da equipe?`, 'Excluir membro', ()=> mutate(s=>{ s.staff = s.staff.filter(x=>x.id!==id); }, 'Membro removido da equipe')); }
  /* Atualizações */
  else if(a==='upd-new'){ openModal(updForm()); }
  else if(a==='upd-edit'){ const u=state.updates.find(x=>x.id===id); if(u) openModal(updForm(u)); }
  else if(a==='upd-del'){ const u=state.updates.find(x=>x.id===id); if(u) confirmBox('Excluir atualização', `Apagar a atualização <b style="color:#fff">${esc(u.version)}</b>?`, 'Excluir', ()=> mutate(s=>{ s.updates = s.updates.filter(x=>x.id!==id); }, 'Atualização excluída')); }
  /* Sugestões */
  else if(a==='sugg-status'){
    const g = state.suggestions.find(x=>x.id===id);
    if(g) mutate(s=>{ s.suggestions.find(x=>x.id===id).status = t.dataset.status; }, `Pedido marcado como ${t.dataset.status}`);
  }
  else if(a==='sugg-del'){ const g=state.suggestions.find(x=>x.id===id); if(g) confirmBox('Excluir sugestão', `Apagar a sugestão de <b style="color:#fff">${esc(g.name)}</b>?`, 'Excluir', ()=> mutate(s=>{ s.suggestions = s.suggestions.filter(x=>x.id!==id); }, 'Sugestão excluída')); }
  /* Reset */
  else if(a==='seed-reset'){
    confirmBox('Restaurar dados', 'Todos os dados serão substituídos pelos valores de demonstração. Continuar?', 'Restaurar tudo', ()=>{
      state = JSON.parse(JSON.stringify(SEED));
      persist(true); render();
      toast('Dados restaurados para o padrão', 'warn', 'refresh');
    });
  }
});
function fallbackCopy(text){
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); }catch(e){}
  ta.remove();
}

/* ---------- Formulários ---------- */
document.addEventListener('submit', e=>{
  const f = e.target.closest('form[data-form]');
  if(!f) return;
  e.preventDefault();
  const type = f.dataset.form, fd = new FormData(f), id = f.dataset.id;

  if(type==='login'){
    if(String(hash(fd.get('pass'))) === state.admin.pass){
      sessionStorage.setItem('oberon_admin_auth','1');
      render(); toast('Bem-vindo ao Painel Admin!', 'success', 'shield');
    } else {
      $('#loginCard').classList.remove('shake'); void $('#loginCard').offsetWidth;
      $('#loginCard').classList.add('shake');
      toast('Senha incorreta!', 'error', 'x');
    }
  }
  else if(type==='suggestion'){
    mutate(s=>{ s.suggestions.push({
      id:uid(), name:fd.get('name').trim(), category:fd.get('category'),
      text:fd.get('text').trim(), status:'pendente', date:todayISO()
    }); });
    toast('Pedido enviado! Vou analisar o quanto antes 🚀', 'success', 'send');
  }
  else if(type==='item'){
    const data = { name:fd.get('name').trim(), desc:fd.get('desc').trim(),
      price:Number(fd.get('price')), category:fd.get('category').trim()||'Geral',
      badge:fd.get('badge'), icon:fd.get('icon')||'package' };
    closeModal();
    mutate(s=>{
      if(id){ Object.assign(s.items.find(x=>x.id===id), data); }
      else { s.items.push({id:uid(), ...data}); }
    }, id?'Item atualizado':'Item adicionado à loja');
  }
  else if(type==='staff'){
    const data = { name:fd.get('name').trim(), role:fd.get('role'), desc:fd.get('desc').trim() };
    closeModal();
    mutate(s=>{
      if(id){ Object.assign(s.staff.find(x=>x.id===id), data); }
      else { s.staff.push({id:uid(), ...data}); }
    }, id?'Membro atualizado':'Membro adicionado à equipe');
  }
  else if(type==='update'){
    const data = { version:fd.get('version').trim(), title:fd.get('title').trim(),
      desc:fd.get('desc').trim(), date:fd.get('date') };
    closeModal();
    mutate(s=>{
      if(id){ Object.assign(s.updates.find(x=>x.id===id), data); }
      else { s.updates.push({id:uid(), ...data}); }
    }, id?'Atualização salva':'Atualização publicada');
  }
  else if(type==='homecfg'){
    mutate(s=>{ Object.assign(s.config, {
      serverName:fd.get('serverName').trim(), storeName:fd.get('storeName').trim(),
      ip:fd.get('ip').trim(), version:fd.get('version').trim(),
      coords:fd.get('coords').trim(),
      about:fd.get('about')
    }); }, 'Página inicial atualizada');
  }
  else if(type==='passwd'){
    if(String(hash(fd.get('cur'))) !== state.admin.pass){ toast('Senha atual incorreta!', 'error', 'x'); return; }
    if(fd.get('new1') !== fd.get('new2')){ toast('As novas senhas não coincidem!', 'error', 'x'); return; }
    mutate(s=>{ s.admin.pass = String(hash(fd.get('new1'))); }, 'Senha do admin alterada');
    f.reset();
  }
});

/* ---------- Partículas (brasas vermelhas) ---------- */
(function embers(){
  if(matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const cv = $('#fx'), ctx = cv.getContext('2d');
  let W, H, parts = [];
  function resize(){ W = cv.width = innerWidth; H = cv.height = innerHeight;
    const n = Math.min(70, Math.floor(W*H/26000));
    parts = Array.from({length:n}, spawn);
  }
  function spawn(){
    return { x:Math.random()*W, y:H + Math.random()*H*.4, s:.6+Math.random()*2.2,
      vy:.15+Math.random()*.55, vx:(Math.random()-.5)*.22, a:.08+Math.random()*.3,
      ph:Math.random()*Math.PI*2, red: Math.random()<.75 };
  }
  addEventListener('resize', resize); resize();
  (function loop(){
    ctx.clearRect(0,0,W,H);
    ctx.globalCompositeOperation = 'lighter';
    for(const p of parts){
      p.y -= p.vy; p.x += p.vx + Math.sin(p.y*.012 + p.ph)*.25;
      if(p.y < -12 || p.x < -12 || p.x > W+12) Object.assign(p, spawn(), {y: H+10, x: Math.random()*W});
      const tw = .55 + .45*Math.sin(performance.now()*.002 + p.ph*3);
      const alpha = p.a * tw * Math.min(1, (H - p.y)/(H*.15)+.2);
      ctx.beginPath();
      ctx.fillStyle = p.red ? `rgba(239,68,68,${alpha})` : `rgba(245,158,11,${alpha*.8})`;
      ctx.shadowColor = p.red ? 'rgba(220,38,38,.8)' : 'rgba(245,158,11,.8)';
      ctx.shadowBlur = p.s*4;
      ctx.arc(p.x, p.y, p.s, 0, 7);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
    requestAnimationFrame(loop);
  })();
})();

/* ---------- Cursor glow ---------- */
(function glow(){
  if(matchMedia('(pointer: coarse)').matches) return;
  const g = $('#cursorGlow');
  let tx=-500, ty=-500, x=tx, y=ty;
  addEventListener('mousemove', e=>{ tx=e.clientX; ty=e.clientY; });
  (function loop(){ x += (tx-x)*.12; y += (ty-y)*.12; g.style.left = x+'px'; g.style.top = y+'px'; requestAnimationFrame(loop); })();
})();
